# Main Hydra config — composes model, dataset, augmentation, and training groups.
# Override any group from the CLI:
#   python scripts/train.py model=swin_tiny dataset=sdnet2018 aug=heavy

defaults:
  - model: resnet50
  - dataset: sdnet2018
  - aug: medium
  - training: default
  - _self_

# Experiment tracking
experiment:
  name: crack-classification
  tracking_uri: sqlite:///mlflow.db
  purpose: baseline
  seed: 42

# Output directories
paths:
  root: ${hydra:runtime.cwd}
  checkpoints: ${paths.root}/outputs/checkpoints
  results: ${paths.root}/outputs/results
  exports: ${paths.root}/outputs/exports
  figures: ${paths.root}/outputs/figures
