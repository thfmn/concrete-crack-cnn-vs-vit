# Medium augmentation — balanced transforms for classification training.
# Uses albumentations. ImageNet normalization applied to all presets.

name: medium

train:
  - _target_: albumentations.RandomResizedCrop
    height: ${dataset.image_size}
    width: ${dataset.image_size}
    scale: [0.8, 1.0]
  - _target_: albumentations.HorizontalFlip
    p: 0.5
  - _target_: albumentations.ColorJitter
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
    p: 0.8
  - _target_: albumentations.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val:
  - _target_: albumentations.Resize
    height: ${dataset.image_size}
    width: ${dataset.image_size}
  - _target_: albumentations.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
