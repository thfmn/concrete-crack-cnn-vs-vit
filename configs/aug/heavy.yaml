# Heavy augmentation — aggressive transforms for segmentation and regularization.
# Uses albumentations. ImageNet normalization applied to all presets.

name: heavy

train:
  - _target_: albumentations.RandomResizedCrop
    height: ${dataset.image_size}
    width: ${dataset.image_size}
    scale: [0.6, 1.0]
  - _target_: albumentations.HorizontalFlip
    p: 0.5
  - _target_: albumentations.VerticalFlip
    p: 0.5
  - _target_: albumentations.RandomRotate90
    p: 0.5
  - _target_: albumentations.ColorJitter
    brightness: 0.3
    contrast: 0.3
    saturation: 0.3
    hue: 0.2
    p: 0.8
  - _target_: albumentations.GaussianBlur
    blur_limit: [3, 5]
    p: 0.3
  - _target_: albumentations.GaussNoise
    p: 0.3
  - _target_: albumentations.CoarseDropout
    max_holes: 8
    max_height: 32
    max_width: 32
    p: 0.5
  - _target_: albumentations.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val:
  - _target_: albumentations.Resize
    height: ${dataset.image_size}
    width: ${dataset.image_size}
  - _target_: albumentations.Normalize
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
