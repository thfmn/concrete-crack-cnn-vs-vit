# Main Hydra config for segmentation — composes model, dataset, augmentation, and training groups.
# Override any group from the CLI:
#   python scripts/train_seg.py model=unet_swin_tiny dataset=crackseg9k aug=heavy

defaults:
  - model: unet_resnet50
  - dataset: crackseg9k
  - aug: medium
  - training: default
  - _self_

# Experiment tracking
experiment:
  name: crack-segmentation
  tracking_uri: sqlite:///mlflow.db
  purpose: baseline
  seed: 42

# Output directories
paths:
  root: ${hydra:runtime.cwd}
  checkpoints: ${paths.root}/outputs/checkpoints
  results: ${paths.root}/outputs/results
  exports: ${paths.root}/outputs/exports
  figures: ${paths.root}/outputs/figures
